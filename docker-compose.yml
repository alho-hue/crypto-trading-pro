version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: neurovest-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: neurovest123
      MONGO_INITDB_DATABASE: neurovest

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurovest-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:neurovest123@mongo:27017/neurovest?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-with-crypto-randomBytes-32-hex}
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neurovest-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
